<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フランス語 数詞</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>フランス語 数詞</h1>
    
    <div class="sliders-wrapper">
        <div class="slider-group">
            <label for="minDigitSlider" class="slider-label">
                <span>最小桁数</span>
                <span id="minDigitLabel">1桁</span>
            </label>
            <input type="range" id="minDigitSlider" min="1" max="9" value="1">
        </div>
        <div class="slider-group">
            <label for="maxDigitSlider" class="slider-label">
                <span>最大桁数</span>
                <span id="maxDigitLabel">3桁</span>
            </label>
            <input type="range" id="maxDigitSlider" min="1" max="9" value="3">
        </div>
        <div class="range-display" id="rangeDisplay">出題範囲: 1 - 999</div>
    </div>

    <div class="number-display" id="numberDisplay">0</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="スペルを入力..." autocomplete="off" spellcheck="false">
    </div>

    <div>
        <button id="checkBtn">判定</button>
        <button id="nextBtn" disabled>次の問題</button>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="score" id="scoreDisplay">正解数: 0 / 出題数: 0</div>
</div>

<script src="script.js">
</script>

</body>
</html>
